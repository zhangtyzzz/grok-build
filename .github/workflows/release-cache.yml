name: Warm release build cache

on:
  workflow_dispatch:

permissions: {}

env:
  CARGO_INCREMENTAL: "0"
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: "3"

concurrency:
  group: release-cache-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Validate warmup source
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      commit: ${{ steps.meta.outputs.commit }}
    steps:
      - name: Check out exact main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Require the default branch
        id: meta
        shell: bash
        env:
          CHECKOUT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref }}
        run: |
          set -euo pipefail
          test "$REF_NAME" = refs/heads/main || {
            echo "release cache warmup must be dispatched from main" >&2
            exit 1
          }
          version="$(awk -F '"' '/^version = / { print $2; exit }' crates/codegen/xai-grok-pager-bin/Cargo.toml)"
          test -n "$version"
          test -z "$(git status --porcelain --untracked-files=normal)"
          {
            echo "version=$version"
            echo "commit=$CHECKOUT_SHA"
          } >>"$GITHUB_OUTPUT"

  build:
    name: Warm ${{ matrix.target }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            timeout_minutes: 240
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            timeout_minutes: 120
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            timeout_minutes: 120
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            timeout_minutes: 120
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            timeout_minutes: 120
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            timeout_minutes: 120
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out exact main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.metadata.outputs.commit }}
          persist-credentials: false
          fetch-depth: 0

      - name: Restore exact release build
        id: release-build-cache
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target/release-build-cache/${{ matrix.target }}
          key: release-build-v1-${{ matrix.target }}-rust-1.92.0-${{ hashFiles('Cargo.lock') }}-${{ needs.metadata.outputs.commit }}

      - name: Install pinned Rust toolchain
        if: steps.release-build-cache.outputs.cache-hit != 'true'
        run: |
          rustup toolchain install 1.92.0 --profile minimal
          rustup default 1.92.0
          rustup target add "${{ matrix.target }}"

      - name: Restore Cargo source cache
        if: steps.release-build-cache.outputs.cache-hit != 'true'
        id: cargo-cache
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-v1-${{ runner.os }}-${{ runner.arch }}-1.92.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-v1-${{ runner.os }}-${{ runner.arch }}-1.92.0-

      - name: Set up compiler cache
        if: steps.release-build-cache.outputs.cache-hit != 'true'
        id: compiler-cache
        uses: ./.github/actions/setup-compiler-cache
        with:
          namespace: release-${{ matrix.target }}
          toolchain: 1.92.0
          lock-hash: ${{ hashFiles('Cargo.lock') }}
          revision: ${{ needs.metadata.outputs.commit }}
          cache-size: 512M

      - name: Prepare checksum-pinned bundled tools
        if: steps.release-build-cache.outputs.cache-hit != 'true'
        run: |
          bash scripts/dist/prepare-release-tools.sh \
            --target "${{ matrix.target }}" \
            --output-dir "$PWD/.release-tools" \
            --github-env "$GITHUB_ENV"

      - name: Fetch locked dependencies
        if: steps.release-build-cache.outputs.cache-hit != 'true'
        run: cargo fetch --locked --target "${{ matrix.target }}"

      - name: Build and stage exact release binary
        if: steps.release-build-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          binary="$(scripts/dist.sh build \
            --target "${{ matrix.target }}" \
            --version "${{ needs.metadata.outputs.version }}")"
          executable="$(node scripts/dist/target.mjs "${{ matrix.target }}" cargoExecutable)"
          cache_dir="$PWD/target/release-build-cache/${{ matrix.target }}"
          mkdir -p "$cache_dir"
          cp -- "$binary" "$cache_dir/$executable"
          cp -- "$binary.build-attestation.json" "$cache_dir/$executable.build-attestation.json"

      - name: Save Cargo source cache
        if: success() && steps.release-build-cache.outputs.cache-hit != 'true' && steps.cargo-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ steps.cargo-cache.outputs.cache-primary-key }}

      - name: Finalize compiler cache
        if: always() && steps.compiler-cache.outputs.enabled == 'true'
        uses: ./.github/actions/finalize-compiler-cache
        with:
          enabled: ${{ steps.compiler-cache.outputs.enabled }}
          save: ${{ job.status == 'success' && steps.release-build-cache.outputs.cache-hit != 'true' && steps.compiler-cache.outputs.cache-hit != 'true' }}
          cache-primary-key: ${{ steps.compiler-cache.outputs.cache-primary-key }}

      - name: Save exact release build
        if: success() && steps.release-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target/release-build-cache/${{ matrix.target }}
          key: ${{ steps.release-build-cache.outputs.cache-primary-key }}

      - name: Report exact cache hit
        if: steps.release-build-cache.outputs.cache-hit == 'true'
        run: echo "exact release build cache already exists for ${{ needs.metadata.outputs.commit }} / ${{ matrix.target }}"
