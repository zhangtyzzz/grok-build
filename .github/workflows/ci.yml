name: CI

on:
  workflow_call:
    inputs:
      compiler_cache_read_only:
        description: Prevent a reusable caller from writing compiler cache entries
        required: false
        default: false
        type: boolean
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  SCCACHE_GHA_ENABLED: "true"
  SCCACHE_GHA_RW_MODE: ${{ (github.event_name == 'pull_request' || inputs.compiler_cache_read_only) && 'READ_ONLY' || 'READ_WRITE' }}
  SCCACHE_GHA_VERSION: grok-build-v1
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: "3"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks and tests
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.92.0 --profile minimal --component rustfmt,clippy
          rustup default 1.92.0

      - name: Restore Cargo source cache
        id: cargo-cache
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-v1-${{ runner.os }}-${{ runner.arch }}-1.92.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-v1-${{ runner.os }}-${{ runner.arch }}-1.92.0-

      - name: Set up compiler cache
        id: sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Enable compiler cache
        if: steps.sccache.outcome == 'success'
        shell: bash
        run: |
          wrapper="$RUNNER_TEMP/grok-sccache-fallback${{ runner.os == 'Windows' && '.exe' || '' }}"
          rustc scripts/ci/sccache-fallback.rs -o "$wrapper"
          echo "GROK_SCCACHE_BIN=$SCCACHE_PATH" >>"$GITHUB_ENV"
          echo "RUSTC_WRAPPER=$wrapper" >>"$GITHUB_ENV"

      - name: Prepare pinned protobuf compiler
        run: |
          bash scripts/dist/prepare-release-tools.sh \
            --target x86_64-unknown-linux-gnu \
            --output-dir "$RUNNER_TEMP/grok-ci-tools" \
            --github-env "$GITHUB_ENV" \
            --protoc-only

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check changed runtime boundaries
        run: |
          cargo check --locked \
            -p xai-grok-sampling-types \
            -p xai-chat-state \
            -p xai-grok-sampler \
            -p xai-grok-shell \
            -p xai-grok-update

      - name: Run core tests
        run: |
          cargo test --locked \
            -p xai-grok-sampling-types \
            -p xai-chat-state \
            -p xai-grok-sampler \
            -p xai-grok-update

      - name: Run shell tests
        run: cargo test --locked -p xai-grok-shell --lib

      - name: Run focused clippy
        run: |
          cargo clippy --locked --all-targets \
            -p xai-grok-sampling-types \
            -p xai-chat-state \
            -p xai-grok-sampler \
            -p xai-grok-shell \
            -p xai-grok-update

      - name: Save Cargo source cache
        if: success() && github.event_name != 'pull_request' && steps.cargo-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ steps.cargo-cache.outputs.cache-primary-key }}

  integration:
    name: Distribution E2E
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install packaging prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes zip

      - name: Test deterministic distribution
        run: bash scripts/dist/test.sh

  terminal:
    name: Terminal, tools, and CLI
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.92.0 --profile minimal --component clippy
          rustup default 1.92.0

      - name: Restore Cargo source cache
        id: cargo-cache
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-v1-${{ runner.os }}-${{ runner.arch }}-1.92.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-v1-${{ runner.os }}-${{ runner.arch }}-1.92.0-

      - name: Set up compiler cache
        id: sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Enable compiler cache
        if: steps.sccache.outcome == 'success'
        shell: bash
        run: |
          wrapper="$RUNNER_TEMP/grok-sccache-fallback${{ runner.os == 'Windows' && '.exe' || '' }}"
          rustc scripts/ci/sccache-fallback.rs -o "$wrapper"
          echo "GROK_SCCACHE_BIN=$SCCACHE_PATH" >>"$GITHUB_ENV"
          echo "RUSTC_WRAPPER=$wrapper" >>"$GITHUB_ENV"

      - name: Prepare pinned protobuf and search tools
        run: |
          bash scripts/dist/prepare-release-tools.sh \
            --target x86_64-unknown-linux-gnu \
            --output-dir "$RUNNER_TEMP/grok-terminal-tools" \
            --github-env "$GITHUB_ENV"

      - name: Check terminal composition
        run: |
          cargo check --locked \
            -p xai-grok-tools \
            -p xai-grok-pager \
            -p xai-grok-pager-bin

      - name: Run tool and terminal tests
        run: |
          cargo test --locked -p xai-grok-tools
          cargo test --locked -p xai-grok-pager --lib
          cargo test --locked -p xai-grok-pager-bin

      - name: Clippy terminal composition
        run: |
          cargo clippy --locked --all-targets \
            -p xai-grok-tools \
            -p xai-grok-pager \
            -p xai-grok-pager-bin

      - name: Save Cargo source cache
        if: success() && github.event_name != 'pull_request' && steps.cargo-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ steps.cargo-cache.outputs.cache-primary-key }}

  windows-protobuf:
    name: Windows protobuf build
    runs-on: windows-2025
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.92.0 --profile minimal
          rustup default 1.92.0

      - name: Restore Cargo source cache
        id: cargo-cache
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-v1-${{ runner.os }}-${{ runner.arch }}-1.92.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-v1-${{ runner.os }}-${{ runner.arch }}-1.92.0-

      - name: Set up compiler cache
        id: sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Enable compiler cache
        if: steps.sccache.outcome == 'success'
        shell: bash
        run: |
          wrapper="$RUNNER_TEMP/grok-sccache-fallback${{ runner.os == 'Windows' && '.exe' || '' }}"
          rustc scripts/ci/sccache-fallback.rs -o "$wrapper"
          echo "GROK_SCCACHE_BIN=$SCCACHE_PATH" >>"$GITHUB_ENV"
          echo "RUSTC_WRAPPER=$wrapper" >>"$GITHUB_ENV"

      - name: Prepare pinned Windows protobuf compiler
        run: |
          bash scripts/dist/prepare-release-tools.sh \
            --target x86_64-pc-windows-msvc \
            --output-dir "$RUNNER_TEMP/grok-windows-protobuf-tools" \
            --github-env "$GITHUB_ENV" \
            --protoc-only

      - name: Check native Windows protobuf generation
        run: cargo check --locked -p xai-grok-tools-api

      - name: Validate PowerShell installer syntax
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/crates/codegen/xai-grok-pager/scripts/install.ps1",
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Save Cargo source cache
        if: success() && github.event_name != 'pull_request' && steps.cargo-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ steps.cargo-cache.outputs.cache-primary-key }}

  required:
    name: CI required
    if: always()
    needs:
      - rust
      - integration
      - terminal
      - windows-protobuf
    runs-on: ubuntu-22.04
    steps:
      - name: Require every CI job
        env:
          RUST_RESULT: ${{ needs.rust.result }}
          INTEGRATION_RESULT: ${{ needs.integration.result }}
          TERMINAL_RESULT: ${{ needs.terminal.result }}
          WINDOWS_PROTOBUF_RESULT: ${{ needs.windows-protobuf.result }}
        run: |
          test "$RUST_RESULT" = success
          test "$INTEGRATION_RESULT" = success
          test "$TERMINAL_RESULT" = success
          test "$WINDOWS_PROTOBUF_RESULT" = success
